[project]
name = "iwslt2026"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "accelerate==1.13.0",
    "datasets==4.8.4",
    "gitpython==3.1.46",
    "ipython==9.12.0",
    "numpy==1.26.4",
    "pandas==2.3.2",
    "peft==0.18.1",
    "sacrebleu==2.6.0",
    "scipy==1.17.1",
    "sentencepiece==0.2.1",
    "torch==2.11.0",
    "torchaudio==2.11.0",
    "torchvision==0.26.0",
    "tqdm==4.67.3",
    "transformers==5.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }
torchvision = { index = "pytorch-cu130" }

[tool.hatch.build.targets.wheel]
packages = ["helper", "model"]
